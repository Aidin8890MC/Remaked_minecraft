<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remaked Minecraft</title>

<style>
body{
    margin:0;
    font-family:tahoma;
    background:linear-gradient(to bottom,#87CEEB,#BFEFFF,#E6F9FF,#FFFFFF);
    min-height:100vh;
    transition:0.3s;
}

body.dark{
    background:#121212;
    color:white;
}

/* TOP BAR */
.telegram{
    background:rgba(255,255,255,0.8);
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    backdrop-filter:blur(5px);
}

body.dark .telegram{
    background:#1f1f1f;
}

/* LINKS */
.top-text a{
    text-decoration:none;
    color:#0088cc;
    font-weight:bold;
}

/* BUTTONS */
.menu-btn{
    font-size:22px;
    background:none;
    border:none;
    cursor:pointer;
}

.theme-btn{
    background:#00a2ff;
    border:none;
    color:white;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
}

/* SIDE MENU */
.side-menu{
    position:fixed;
    top:0;
    right:0;
    width:50%;
    height:100%;
    background:white;
    transform:translateX(100%);
    transition:0.3s;
    z-index:11;
    padding:20px;
}

body.dark .side-menu{
    background:#1f1f1f;
}

.side-menu.active{
    transform:translateX(0);
}

.side-menu a{
    display:block;
    margin:15px 0;
    text-decoration:none;
    color:inherit;
    font-size:18px;
}

/* CONTENT */
.container{
    display:flex;
    justify-content:center;
    padding:40px 20px;
}

.card{
    width:350px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,0.15);
    cursor:pointer;
}

body.dark .card{
    background:#1f1f1f;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.content{
    padding:15px;
}

.download{
    display:block;
    margin-top:15px;
    background:#00a2ff;
    color:white;
    text-decoration:none;
    text-align:center;
    padding:12px;
    border-radius:10px;
}

/* POPUP */
#popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
    z-index:20;
}

.popup-box{
    background:white;
    padding:25px;
    border-radius:15px;
}

body.dark .popup-box{
    background:#1f1f1f;
    color:white;
}

.close{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:#00a2ff;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="telegram">

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <div class="top-text">
        کانال تلگرام ما:
        <a href="https://t.me/Remaked_minecraft" target="_blank">
        t.me/Remaked_minecraft
        </a>
    </div>

    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">D</button>

</div>

<!-- SIDE MENU -->
<div class="side-menu" id="menu">
    <h3>Menu</h3>

    <a href="#mc" onclick="toggleMenu()">Minecraft Remaked</a>

    <!-- فقط همین یکی تغییر کرد -->
    <a href="#" onclick="openCheatDialog(event)">Cheat Clients</a>

</div>

<!-- CONTENT -->
<div class="container">

<div class="card" onclick="showPopup()">

<img src="minecraft-editing.jpg">

<div class="content">
<h2>Minecraft Editing</h2>

<p>ماینکرافت ریمیک و ادیت شده</p>

<a class="download"
href="https://drive.google.com/file/d/1rpNoigmagD4OC46hVqG3uOb1Ip-GlXuW/view?usp=drivesdk"
target="_blank">
دانلود
</a>

</div>
</div>

</div>

<!-- POPUP (قبلی) -->
<div id="popup">
<div class="popup-box">
<h2>⛏️ Minecraft Editing</h2>
<p>در حال انتقال...</p>
<button class="close" onclick="hidePopup()">بستن</button>
</div>
</div>

<!-- 🔥 NEW CHEAT DIALOG -->
<div id="cheatDialog" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:30;">
    <div class="popup-box">
        <h2>Cheat Clients</h2>
        <p>فعلاً در دسترس نیست</p>
        <button class="close" onclick="closeCheatDialog()">باشه</button>
    </div>
</div>

<script>

let dark=false;

/* THEME */
function toggleTheme(){
    dark=!dark;
    document.body.classList.toggle("dark");
    document.getElementById("themeBtn").innerText = dark ? "L" : "D";
}

/* MENU */
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
}

/* OLD POPUP */
function showPopup(){
    document.getElementById("popup").style.display="flex";
}

function hidePopup(){
    document.getElementById("popup").style.display="none";
}

/* 🔥 CHEAT DIALOG */
function openCheatDialog(e){
    e.preventDefault();
    document.getElementById("cheatDialog").style.display="flex";
    toggleMenu();
}

function closeCheatDialog(){
    document.getElementById("cheatDialog").style.display="none";
}

</script>

</body>
</html>
