<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remaked Minecraft</title>

<style>
body{
    margin:0;
    font-family:tahoma;
    background:linear-gradient(to bottom,#87CEEB,#BFEFFF,#E6F9FF,#FFFFFF);
    min-height:100vh;
}

.telegram{
    background:rgba(255,255,255,0.8);
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    position:sticky;
    top:0;
    backdrop-filter:blur(5px);
}

.telegram a{
    text-decoration:none;
    color:#0088cc;
}

.container{
    display:flex;
    justify-content:center;
    padding:40px 20px;
}

.card{
    width:350px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,0.15);
    transition:0.3s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.content{
    padding:15px;
}

.content h2{
    margin-top:0;
}

.download{
    display:block;
    margin-top:15px;
    background:#00a2ff;
    color:white;
    text-decoration:none;
    text-align:center;
    padding:12px;
    border-radius:10px;
}

#popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:white;
    padding:25px;
    border-radius:15px;
    max-width:400px;
    text-align:center;
}

.close{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:#00a2ff;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="telegram">
کانال تلگرام ما:
<a href="https://t.me/Remaked_minecraft" target="_blank">
t.me/Remaked_minecraft
</a>
</div>

<div class="container">

<div class="card" onclick="showReaction()">

<img src="minecraft-editing.jpg" alt="Minecraft Editing">

<div class="content">
<h2>Minecraft Editing</h2>

<p>
ماینکرافت ریمیک و ادیت شده کاملا دست ساز با اسکین پک های کیپ دار و خاص با موزیک فانک پس زمینه و تغییر کردن پانوراما ، نسخه ۱.۲۱.۵۱ که برای ورود به سرور اکانت نمیخواد
</p>

<a class="download"
href="https://drive.google.com/file/d/1rpNoigmagD4OC46hVqG3uOb1Ip-GlXuW/view?usp=drivesdk"
target="_blank">
دانلود
</a>

</div>
</div>

</div>

<div id="popup">
<div class="popup-box">
<h2>⛏️ Minecraft Editing</h2>
<p>
به صفحه دانلود نسخه ادیت شده منتقل می‌شوی.
</p>
<button class="close" onclick="hideReaction()">بستن</button>
</div>
</div>

<script>
function showReaction(){
    document.getElementById("popup").style.display="flex";
}

function hideReaction(){
    document.getElementById("popup").style.display="none";
}
</script>

</body>
  </html>
